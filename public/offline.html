<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Pohuntoon Offline</title>
    <meta
      name="description"
      content="Pohuntoon is temporarily offline. Reconnect to continue syncing your work."
    />
    <meta name="theme-color" content="#1E4E9A" />
    <style>
      :root {
        color-scheme: light;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        background: #f8f9fc;
        color: #172b4d;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background: #f8f9fc;
      }

      main {
        width: min(100%, 28rem);
        padding: 2rem;
        border-radius: 1.5rem;
        background: #ffffff;
        box-shadow: 0 10px 30px rgba(23, 43, 77, 0.08);
      }

      p {
        margin: 0;
      }

      .eyebrow {
        color: #1e4e9a;
        font-size: 0.875rem;
        font-weight: 600;
      }

      h1 {
        margin: 0.75rem 0 0;
        font-size: 1.75rem;
        line-height: 1.2;
      }

      .body {
        margin-top: 0.75rem;
        color: #6b7280;
        font-size: 0.95rem;
        line-height: 1.6;
      }

      .note {
        margin-top: 1.5rem;
        color: #6b7280;
        font-size: 0.75rem;
      }
    </style>
  </head>
  <body>
    <main>
      <p class="eyebrow">Pohuntoon</p>
      <h1>You are offline</h1>
      <p class="body">
        Reconnect to continue syncing live work across Pohuntoon.
      </p>
      <p class="note">Open the app again after your connection returns.</p>
    </main>
  </body>
</html>
